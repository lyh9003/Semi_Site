name: Daily Situation Briefing

on:
  schedule:
    - cron: '0 23 * * *'  # KST 08:00 (UTC 23:00)
    - cron: '0  2 * * *'  # KST 11:00 (UTC 02:00)
    - cron: '0  8 * * *'  # KST 17:00 (UTC 08:00)
    - cron: '0 14 * * *'  # KST 23:00 (UTC 14:00)
    - cron: '30 14 * * *' # KST 23:30 (UTC 14:30) — 주간 요약
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Leave blank for today (KST).'
        required: false

jobs:
  generate:
    name: Generate Daily Briefing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Generate briefing
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VERCEL_URL: https://semi-site.vercel.app
        run: |
          # KST 23:30 cron (UTC 14:30)이면 주간 요약만 실행
          UTC_MINUTE=$(date -u +"%M")
          UTC_HOUR=$(date -u +"%H")
          if [ "$UTC_HOUR" = "14" ] && [ "$UTC_MINUTE" -ge "25" ]; then
            python generate_weekly_summary.py
          else
            if [ -n "${{ github.event.inputs.date }}" ]; then
              python generate_daily_briefing.py "${{ github.event.inputs.date }}"
            else
              python generate_daily_briefing.py
            fi
          fi
